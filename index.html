<!DOCTYPE html><html lang="en"><head>
<meta property="og:title" content="Speed Converter — DevKit">
<meta property="og:description" content="Free online Speed Converter tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/speed-converter/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/speed-converter/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Convert between km/h, mph, m/s, knots"><title>Speed Converter — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:100%;}
h1{font-size:20px;color:#f0f6fc;margin-bottom:20px;text-align:center;}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-size:20px;text-align:center;margin-bottom:12px;}
input:focus{outline:none;border-color:var(--accent);}
select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;margin-bottom:12px;}
.results{display:grid;gap:6px;}
.r{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:13px;}
.r .val{color:var(--accent);font-weight:600;}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body><div class="card"><h1>🏎️ Speed</h1>
<input type="number" id="val" value="100" oninput="conv()">
<select id="from" onchange="conv()"><option value="kmh" selected>km/h</option><option value="mph">mph</option><option value="ms">m/s</option><option value="knot">Knots</option><option value="mach">Mach</option></select>
<div class="results" id="results"></div></div>
<script>
'use strict';
const toMs={kmh:0.277778,mph:0.44704,ms:1,knot:0.514444,mach:343};
const units=Object.keys(toMs);
function conv(){const v=parseFloat(document.getElementById('val').value)||0;const f=document.getElementById('from').value;const ms=v*toMs[f];document.getElementById('results').innerHTML=units.filter(u=>u!==f).map(u=>'<div class="r"><span>'+u+'</span><span class="val">'+(ms/toMs[u]).toFixed(4)+'</span></div>').join('')}conv();
</script></body></html>
